<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Series</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <div class="container">
        <h2>
            TV Series
        </h2>
        <div class="row">
            <div class="col-8">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Channel</th>
                            <th>Seasons</th>
                        </tr>
                    </thead>
                    <tbody id="series-body"></tbody>
                </table>
                <p>
                    Seasons average: 
                    <span id="promedio"></span>
                </p>
            </div>
            <div class="col-4">
                <div id="series-detail"></div>
            </div>
        </div>
    </div>
    <script type="module" src="./dist/Serie.js"></script>
    <script type="module" src="./dist/dataSerie.js"></script>
    <script type="module" src="./dist/main.js"></script>

</body>
</html>
